<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 260px; padding: 12px; font-family: system-ui; font-size: 13px; }
    h3 { margin: 0 0 8px; font-size: 14px; }
    label { display: block; margin-bottom: 8px; font-size: 12px; }
    input[type="text"], input[type="password"], select { width: 100%; box-sizing: border-box; margin-top: 4px; padding: 6px; }
    .hint { color: #6b7280; font-size: 11px; display: block; margin-top: 3px; }
    button { width: 100%; margin-top: 6px; padding: 6px 8px; }
    #status { margin-top: 8px; padding: 6px 8px; border-radius: 4px; font-size: 12px; }
    .ok { background: #dcfce7; color: #166534; }
    .warn { background: #fef3c7; color: #92400e; }
  </style>
</head>
<body>
  <h3>StockHelper Bridge</h3>
  <label>
    服务地址
    <input id="server" type="text" placeholder="https://stock-api.unibuy.fun" />
  </label>
  <label>
    API Key
    <input id="apiKey" type="password" placeholder="仅首次安装时填写" />
  </label>
  <label>
    作为后台执行机
    <select id="workerMode">
      <option value="auto">自动检测（能访问本地后台则开启）</option>
      <option value="on">强制开启</option>
      <option value="off">强制关闭</option>
    </select>
    <span class="hint">决定本机是否回答“后台DeepSeek”查询。自动模式下，运行后台服务的机器会自动开启，其他机器自动关闭。</span>
  </label>
  <button id="save">保存</button>
  <div id="status" class="warn">请先配置 API Key</div>
  <script src="popup.js"></script>
</body>
</html>
