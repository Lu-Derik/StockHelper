<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 260px; padding: 12px; font-family: system-ui; font-size: 13px; }
    h3 { margin: 0 0 8px; font-size: 14px; }
    label { display: block; margin-bottom: 8px; font-size: 12px; }
    input { width: 100%; box-sizing: border-box; margin-top: 4px; padding: 6px; }
    button { width: 100%; margin-top: 6px; padding: 6px 8px; }
    #status { margin-top: 8px; padding: 6px 8px; border-radius: 4px; font-size: 12px; }
    .ok { background: #dcfce7; color: #166534; }
    .warn { background: #fef3c7; color: #92400e; }
  </style>
</head>
<body>
  <h3>StockHelper Bridge</h3>
  <label>
    执行模式
    <select id="mode">
      <option value="app">App 直接触发扩展（本地 DeepSeek）</option>
      <option value="backend">后台触发扩展（后台 DeepSeek）</option>
    </select>
  </label>
  <label>
    服务地址
    <input id="server" type="text" placeholder="http://localhost:3011" />
  </label>
  <label>
    API Key
    <input id="apiKey" type="password" placeholder="可留空" />
  </label>
  <button id="save">保存</button>
  <div id="status" class="warn">请先配置服务地址</div>
  <script src="popup.js"></script>
</body>
</html>
